<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="../src/favicon.svg" type="image/svg+xml">
<script>if(localStorage.getItem("bs-theme")==="dark")document.documentElement.classList.add("dark"),document.body&&document.body.classList.add("dark");</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BreatheSafe — Sign In</title>
  <script src="../js/theme.js"></script>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>

  <div class="particles">
    <div class="particle one"></div>
    <div class="particle two"></div>
    <div class="particle three"></div>
  </div>

  <main class="login-container">
    <div class="login-card">

      <p class="login-label">Respiratory Intelligence</p>
      <h1>Welcome to <span>BreatheSafe</span></h1>
      <p class="login-description">Your personal air quality and breathing health companion.</p>

      <!-- Tab toggle -->
      <div class="login-tabs">
        <button class="login-tab active" id="tabSignIn">Sign In</button>
        <button class="login-tab" id="tabSignUp">Sign Up</button>
      </div>

      <!-- Error message -->
      <div class="login-error" id="loginError"></div>

      <!-- Email/password form -->
      <div class="login-form">
        <div class="login-input-wrap">
          <input type="email" id="emailInput" class="login-input" placeholder="Email address" />
        </div>
        <div class="login-input-wrap">
          <input type="password" id="passwordInput" class="login-input" placeholder="Password" />
        </div>
        <button class="login-submit-btn" id="emailAuthBtn">
          <span id="emailAuthLabel">Sign In</span>
          <div class="login-spinner" id="loginSpinner"></div>
        </button>
      </div>

      <!-- Divider -->
      <div class="login-divider">
        <span>or</span>
      </div>

      <!-- Google button -->
      <button id="google-login">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="Google">
        Continue with Google
      </button>

    </div>
  </main>

  <script type="module" src="../js/login.js"></script>

</body>
</html>
