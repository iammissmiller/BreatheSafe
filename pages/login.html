<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BreatheSafe Login</title>

  <!-- theme.js FIRST — applies body.dark before paint, no flicker -->
  <script src="../js/theme.js"></script>

  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>

  <div class="particles">
    <div class="particle one"></div>
    <div class="particle two"></div>
    <div class="particle three"></div>
  </div>

  <main class="login-container">
    <div class="login-card">

      <p class="login-label">RESPIRATORY INTELLIGENCE</p>

      <h1>Welcome to <span>BreatheSafe</span></h1>

      <p class="login-description">
        Personalized environmental respiratory intelligence
        powered by AQI analysis, AI insights, and adaptive breathing safety.
      </p>

      <button id="google-login">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="Google">
        Continue With Google
      </button>

    </div>
  </main>

  <script type="module" src="../js/login.js"></script>

</body>
</html>
