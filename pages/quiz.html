<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BreatheSafe — Setup</title>
  <script src="../js/theme.js"></script>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/quiz.css">
</head>
<body>

  <div class="particles">
    <div class="particle one"></div>
    <div class="particle two"></div>
    <div class="particle three"></div>
  </div>

  <!-- Progress bar -->
  <div class="quiz-progress-wrap">
    <div class="quiz-progress-bar" id="progressBar"></div>
  </div>

  <!-- Step counter -->
  <div class="quiz-counter" id="quizCounter">1 of 8</div>

  <!-- Main -->
  <main class="quiz-wrap">
    <div class="quiz-stage" id="quizStage">
      <!-- Questions injected by quiz.js -->
    </div>
  </main>

  <script type="module" src="../js/quiz.js"></script>

</body>
</html>
