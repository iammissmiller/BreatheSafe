<!DOCTYPE html>
<html lang="en">
<head>
  <script>if(localStorage.getItem("bs-theme")==="dark"){document.documentElement.classList.add("dark");document.documentElement.style.background="#0f0f0f";var s=document.createElement("style");s.textContent="*{transition:none!important}";document.head.appendChild(s);window.addEventListener("DOMContentLoaded",function(){document.body&&document.body.classList.add("dark");setTimeout(function(){s.remove()},100)});}</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BreatheSafe — Reset Password</title>
  <link rel="icon" type="image/svg+xml" href="../src/favicon.svg">
  <script src="../js/theme.js"></script>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>

  <div class="particles">
    <div class="particle one"></div>
    <div class="particle two"></div>
    <div class="particle three"></div>
  </div>

  <main class="login-container">
    <div class="login-card">

      <p class="login-label">Password Reset</p>
      <h1>Set a new <span>password</span></h1>
      <p class="login-description">Enter your new password below.</p>

      <div class="login-error" id="resetError"></div>

      <div class="login-form" id="resetForm">
        <div class="login-input-wrap">
          <input type="password" id="newPassword" class="login-input" placeholder="New password" />
        </div>
        <div class="login-input-wrap">
          <input type="password" id="confirmPassword" class="login-input" placeholder="Confirm new password" />
        </div>
        <button class="login-submit-btn" id="resetBtn">
          <span id="resetLabel">Set New Password</span>
          <div class="login-spinner" id="resetSpinner"></div>
        </button>
      </div>

      <div id="successMsg" style="display:none;text-align:center;">
        <div style="font-size:2rem;margin-bottom:12px;">✅</div>
        <p style="color:var(--sa);font-size:0.9rem;margin-bottom:20px;">Password updated successfully!</p>
        <a href="login.html" class="login-submit-btn" style="text-decoration:none;display:block;padding:12px;text-align:center;">Go to Sign In</a>
      </div>

    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, confirmPasswordReset, verifyPasswordResetCode } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBx-BCvoJn8_KrpVL8eWM-rW0ELyCj7ULs",
      authDomain: "breathesafe-20c64.firebaseapp.com",
      projectId: "breathesafe-20c64",
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const params  = new URLSearchParams(window.location.search);
    const oobCode = params.get('oobCode');
    const errorEl = document.getElementById('resetError');

    if (!oobCode) {
      errorEl.textContent = 'Invalid reset link. Please request a new one.';
      errorEl.classList.add('visible');
      document.getElementById('resetForm').style.display = 'none';
    }

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.add('visible');
    }

    document.getElementById('resetBtn').addEventListener('click', async () => {
      const newPass     = document.getElementById('newPassword').value;
      const confirmPass = document.getElementById('confirmPassword').value;

      if (!newPass || newPass.length < 6) {
        showError('Password must be at least 6 characters.');
        return;
      }
      if (newPass !== confirmPass) {
        showError('Passwords do not match.');
        return;
      }

      document.getElementById('resetBtn').disabled = true;
      document.getElementById('resetLabel').style.display = 'none';
      document.getElementById('resetSpinner').classList.add('active');

      try {
        await confirmPasswordReset(auth, oobCode, newPass);
        document.getElementById('resetForm').style.display = 'none';
        document.getElementById('successMsg').style.display = 'block';
      } catch (err) {
        showError('Reset link expired or already used. Please request a new one.');
        document.getElementById('resetBtn').disabled = false;
        document.getElementById('resetLabel').style.display = 'inline';
        document.getElementById('resetSpinner').classList.remove('active');
      }
    });
  </script>

</body>
</html>
